apiVersion: v1
kind: Namespace
metadata:
  name: ckbotmaster
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auditbot-config
  namespace: ckbotmaster
data:
  Bot__ReasonTimeoutHours: "24"
  Bot__PromptMode: "DmThenMention"
  Bot__CleanChannelOnStartup: "true"
  # Comma-separated values are bound by ASP.NET Core config via __0, __1 etc.
  # Override individual major event types with Bot__MajorEventTypes__0=Ban, Bot__MajorEventTypes__1=Kick, etc.
  # The bot has built-in defaults if these are not set.
  Logging__LogLevel__Default: "Information"
  Logging__LogLevel__Microsoft.Hosting.Lifetime: "Information"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auditbot
  namespace: ckbotmaster
  labels:
    app.kubernetes.io/name: auditbot
spec:
  # Bot must be a singleton — duplicate replicas would post duplicate audit messages.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: auditbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auditbot
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: auditbot
          image: ghcr.io/ckchessmaster/ckbotmaster-auditbot:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: auditbot-config
            - secretRef:
                name: auditbot-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
