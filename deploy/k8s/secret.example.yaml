# Copy this file to secret.yaml, fill in real values, and DO NOT commit it.
# Or apply via: kubectl create secret generic auditbot-secrets -n ckbotmaster \
#   --from-literal=Bot__Token="..." \
#   --from-literal=Bot__GuildId="123" \
#   --from-literal=Bot__AuditChannelId="456" \
#   --from-literal=ConnectionStrings__auditdb="Host=postgres-rw.cnpg-services.svc.cluster.local;Database=app;Username=hive;Password=...;SSL Mode=Require;Trust Server Certificate=true"
apiVersion: v1
kind: Secret
metadata:
  name: auditbot-secrets
  namespace: ckbotmaster
type: Opaque
stringData:
  Bot__Token: "REPLACE_ME_DISCORD_BOT_TOKEN"
  Bot__GuildId: "REPLACE_ME_GUILD_SNOWFLAKE"
  Bot__AuditChannelId: "REPLACE_ME_CHANNEL_SNOWFLAKE"
  ConnectionStrings__auditdb: "Host=postgres-rw.cnpg-services.svc.cluster.local;Database=app;Username=hive;Password=REPLACE_ME;SSL Mode=Require;Trust Server Certificate=true"
